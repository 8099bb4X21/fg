name: Fork Client

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Free up some disk space.
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: false

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: nttld/setup-ndk@v1.4.2
        id: setup-ndk-r21e
        with:
          ndk-version: r21e
          link-to-sdk: true

      - uses: nttld/setup-ndk@v1.4.2
        id: setup-ndk-r23c
        with:
          ndk-version: r23c
          link-to-sdk: true

      - name: Install NDK for the JNI build (ndkVersion).
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;27.2.12479018"

      - name: Decode keystore.
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > TMessagesProj/config/release.keystore

      - name: Build.
        run: |
          ###
          vars=gradle.properties

          echo "org.gradle.workers.max=1" >> $vars
          echo "APP_ID=${{ secrets.APP_ID }}" >> $vars
          echo "APP_HASH=${{ secrets.APP_HASH }}" >> $vars
          echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $vars
          echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $vars
          echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $vars
          echo "RELEASE_KEYSTORE_FILE=$PWD/TMessagesProj/config/release.keystore" >> $vars
          echo "NATIVE_DEPS_NDK_DIR=${{ steps.setup-ndk-r21e.outputs.ndk-path }}" >> $vars

          ###
          sudo apt update
          sudo apt -y install ninja-build meson unzip pip gperf
          ./gradlew :TMessagesProj_App:assembleAfatRelease

          grep VERSION_NAME TMessagesProj/build/generated/source/buildConfig/release/org/telegram/messenger/BuildConfig.java | cut -d'"' -f 2 > ver.txt

          mkdir -p artifact
          mv TMessagesProj_App/build/outputs/apk/afat/release/app.apk app.apk
          cp app.apk "artifact/ForkClient $(cat ver.txt).apk"

      - uses: actions/upload-artifact@v4
        with:
          name: ForkClient-${{ github.sha }}
          path: artifact/*.apk
